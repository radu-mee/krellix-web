<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Krellix — Coming Soon</title>
    <meta
      name="description"
      content="Krellix is launching soon. Join the waitlist for early access."
    />
    <link rel="canonical" href="https://krellixlabs.com/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --white: #ffffff;
        --white-80: rgba(255, 255, 255, 0.8);
        --white-65: rgba(255, 255, 255, 0.65);
        --shadow: rgba(0, 0, 0, 0.25);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", "Segoe UI", sans-serif;
        color: var(--white);
        background: #101010 url("Assets/bg.png") center/cover no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .page {
        width: min(960px, 100%);
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
      }

      .logo {
        width: min(160px, 50vw);
        height: auto;
        filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.25));
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 2.6vw, 2.7rem);
        font-weight: 500;
        line-height: 1.35;
        color: var(--white-80);
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      .newsletter-form-container {
        width: min(520px, 100%);
      }

      .newsletter-form {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        background: rgba(255, 255, 255, 0.12);
        padding: 6px;
        border-radius: 14px;
        backdrop-filter: blur(12px);
        box-shadow: 0 12px 30px var(--shadow);
      }

      .newsletter-form-input {
        flex: 1;
        border: none;
        background: var(--white);
        color: #5b5b5b;
        font-size: 0.95rem;
        padding: 12px 14px;
        border-radius: 10px;
        outline: none;
      }

      .newsletter-form-button,
      .newsletter-loading-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        background: #101010;
        color: var(--white);
        font-size: 0.9rem;
        font-weight: 500;
        padding: 12px 16px;
        border-radius: 10px;
        cursor: pointer;
        flex-grow: 0;
        transition: transform 0.2s ease, box-shadow 0.2s ease,
          flex-grow 0.35s ease, width 0.35s ease;
        white-space: nowrap;
      }

      .newsletter-form-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 18px rgba(0, 0, 0, 0.25);
      }

      .newsletter-loading-button {
        display: none;
      }

      .newsletter-success,
      .newsletter-error {
        display: none;
        justify-content: center;
        align-items: center;
        margin-top: 14px;
        font-size: 0.9rem;
        color: var(--white-65);
      }

      .newsletter-error {
        color: #ffd1c9;
      }

      .newsletter-back-button {
        display: none;
        margin: 10px auto 0;
        background: none;
        border: none;
        color: var(--white-65);
        font-size: 0.85rem;
        cursor: pointer;
      }

      .newsletter-back-button:hover {
        text-decoration: underline;
      }

      .success-state h1 {
        color: var(--white);
      }

      .success-state .newsletter-form {
        gap: 0;
      }

      .success-state .newsletter-form-input {
        display: none;
      }

      .success-state .newsletter-form-button {
        width: 100%;
        flex-grow: 1;
        cursor: default;
        box-shadow: none;
        white-space: normal;
        text-align: center;
        line-height: 1.4;
        justify-content: center;
        pointer-events: none;
      }

      .success-state .newsletter-form-button:hover {
        transform: none;
      }

      @media (max-width: 600px) {
        .newsletter-form {
          flex-direction: column;
          align-items: stretch;
        }

        .newsletter-form-button,
        .newsletter-loading-button {
          width: 100%;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <img class="logo" src="Assets/krellix-logo.svg" alt="Krellix" />
      <h1 data-default-title="Your AI copilots powering real-time, interactive experiences">
        Your AI copilots powering real-time, interactive experiences
      </h1>

      <div class="newsletter-form-container">
        <form
          class="newsletter-form"
          action="https://app.loops.so/api/newsletter-form/cmksjrb07207v0iyr8e6bfowy"
          method="POST"
        >
          <input
            class="newsletter-form-input"
            placeholder="you@example.com"
            required
            type="email"
            name="newsletter-form-input"
          />
          <button type="submit" class="newsletter-form-button">
            Join the waitlist
          </button>
          <button type="button" class="newsletter-loading-button">
            Please wait...
          </button>
        </form>
        <div class="newsletter-success" role="status" aria-live="polite">
          <p class="newsletter-success-message">Thanks! We will be in touch.</p>
        </div>
        <div class="newsletter-error" role="status" aria-live="polite">
          <p class="newsletter-error-message">
            Oops! Something went wrong, please try again.
          </p>
        </div>
        <button type="button" class="newsletter-back-button">← Back</button>
      </div>
    </main>

    <script>
      function submitHandler(event) {
        event.preventDefault();
        var container = event.target.parentNode;
        var page = document.querySelector(".page");
        var form = container.querySelector(".newsletter-form");
        var formInput = container.querySelector(".newsletter-form-input");
        var success = container.querySelector(".newsletter-success");
        var errorContainer = container.querySelector(".newsletter-error");
        var errorMessage = container.querySelector(".newsletter-error-message");
        var backButton = container.querySelector(".newsletter-back-button");
        var submitButton = container.querySelector(".newsletter-form-button");
        var loadingButton = container.querySelector(".newsletter-loading-button");
        var successState = false;

        success.style.display = "none";
        errorContainer.style.display = "none";

        var rateLimit = function () {
          errorContainer.style.display = "flex";
          errorMessage.innerText =
            "Too many signups, please try again in a little while";
          submitButton.style.display = "none";
          formInput.style.display = "none";
          backButton.style.display = "block";
        };

        var time = new Date();
        var timestamp = time.valueOf();
        var previousTimestamp = localStorage.getItem("loops-form-timestamp");

        if (previousTimestamp && Number(previousTimestamp) + 60000 > timestamp) {
          rateLimit();
          return;
        }
        localStorage.setItem("loops-form-timestamp", timestamp);

        submitButton.style.display = "none";
        loadingButton.style.display = "inline-flex";

        var formBody =
          "userGroup=&mailingLists=&email=" +
          encodeURIComponent(formInput.value);

        fetch(event.target.action, {
          method: "POST",
          body: formBody,
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
          },
        })
          .then(function (res) {
            return [res.ok, res.json(), res];
          })
          .then(function (_ref) {
            var ok = _ref[0];
            var dataPromise = _ref[1];
            var res = _ref[2];
            if (ok) {
              successState = true;
              if (page) page.classList.add("success-state");
              submitButton.textContent =
                "All done! You have been added to our waitlist. We'll be in touch.";
              submitButton.setAttribute("aria-disabled", "true");
              submitButton.disabled = true;
              submitButton.style.display = "inline-flex";
              form.reset();
            } else {
              dataPromise.then(function (data) {
                errorContainer.style.display = "flex";
                errorMessage.innerText = data.message
                  ? data.message
                  : res.statusText;
              });
            }
          })
          .catch(function (error) {
            if (error.message === "Failed to fetch") {
              rateLimit();
              return;
            }
            errorContainer.style.display = "flex";
            if (error.message) errorMessage.innerText = error.message;
            localStorage.setItem("loops-form-timestamp", "");
          })
          .finally(function () {
            formInput.style.display = "none";
            loadingButton.style.display = "none";
            if (successState) {
              backButton.style.display = "none";
            } else {
              backButton.style.display = "block";
            }
          });
      }

      function resetFormHandler(event) {
        var container = event.target.parentNode;
        var page = document.querySelector(".page");
        var formInput = container.querySelector(".newsletter-form-input");
        var success = container.querySelector(".newsletter-success");
        var errorContainer = container.querySelector(".newsletter-error");
        var errorMessage = container.querySelector(".newsletter-error-message");
        var backButton = container.querySelector(".newsletter-back-button");
        var submitButton = container.querySelector(".newsletter-form-button");

        success.style.display = "none";
        errorContainer.style.display = "none";
        errorMessage.innerText = "Oops! Something went wrong, please try again";
        backButton.style.display = "none";
        formInput.style.display = "block";
        submitButton.style.display = "inline-flex";
        submitButton.disabled = false;
        submitButton.removeAttribute("aria-disabled");
        submitButton.textContent = "Join the waitlist";
        if (page) page.classList.remove("success-state");
      }

      var formContainers = document.getElementsByClassName(
        "newsletter-form-container"
      );

      for (var i = 0; i < formContainers.length; i++) {
        var formContainer = formContainers[i];
        var handlersAdded = formContainer.classList.contains(
          "newsletter-handlers-added"
        );
        if (handlersAdded) continue;
        formContainer
          .querySelector(".newsletter-form")
          .addEventListener("submit", submitHandler);
        formContainer
          .querySelector(".newsletter-back-button")
          .addEventListener("click", resetFormHandler);
        formContainer.classList.add("newsletter-handlers-added");
      }
    </script>
  </body>
</html>
